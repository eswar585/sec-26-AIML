<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1565d8,#42a5f5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#1565d8;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#1565d8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0d47a1;
}

#error{
color:red;
text-align:center;
margin-top:10px;
}
</style>

</head>
<body>

<div class="login-box">

<h2>FA Marks Login</h2>

<input
type="text"
id="regNo"
placeholder="Registration Number">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="error"></p>

</div>

<script src="database.js"></script>
<script src="login.js"></script>

</body>
</html>
