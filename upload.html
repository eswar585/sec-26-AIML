<!DOCTYPE html>
<html>
<head>
    <title>Upload Students</title>
</head>
<body>

<h2>Uploading Students...</h2>
<p id="status">Starting...</p>

<script type="module">

import { db } from "./firebase-config.js";

import {
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import { studentDatabase } from "./students.js";

async function uploadStudents(){

    let count = 0;

    for(const student of studentDatabase){

        const data = {
            regNo: student.regNo,
            name: student.name,
            password: student.regNo
        };

        for(const subject in student.marks){
            data[subject] = student.marks[subject];
        }

        await setDoc(
            doc(db,"students",student.regNo),
            data
        );

        count++;

        document.getElementById("status").innerHTML =
        `Uploaded ${count} students`;
    }

    document.getElementById("status").innerHTML =
    "✅ Upload Complete";
}

uploadStudents();

</script>

</body>
</html>
