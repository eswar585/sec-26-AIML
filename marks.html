<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FA Marks</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#f4f7fc;
}

.card{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
color:#1565d8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#1565d8;
color:white;
padding:12px;
}

td{
padding:12px;
border:1px solid #ddd;
}

.logout{
margin-top:20px;
padding:12px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.logout:hover{
background:darkred;
}

</style>

</head>
<body>

<div class="card">

<h1>FA Marks Report</h1>

<h2 id="studentName"></h2>

<p id="studentReg"></p>

<table>

<thead>
<tr>
<th>Subject</th>
<th>Marks</th>
</tr>
</thead>

<tbody id="marksTable"></tbody>

</table>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<script src="database.js"></script>
<script src="marks.js"></script>

</body>
</html>
